<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Трекер Привычек</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <div class="logo">
        <span class="sparkle">✧</span> Гламурно
      </div>
      <h1>Мои Привычки</h1>
      <button id="add-btn" class="add-button">
        <i class="fas fa-plus"></i> Новая привычка
      </button>
    </header>

    <main id="habits-container">
      <!-- Привычки добавляются через JS -->
    </main>

    <!-- Motivational footer -->
    <div class="motivation">
      <p>"Красота - это привычка"</p>
      <span>Coco Chanel</span>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
